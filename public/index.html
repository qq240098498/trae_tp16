<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>闲鱼二手 - 二手交易平台</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="logo" onclick="navigate('home')">
        <span class="logo-icon">🐟</span>
        <span>闲鱼二手</span>
      </div>
      <nav class="nav" id="nav">
        <a onclick="navigate('home')">首页</a>
        <a onclick="navigate('publish')" id="nav-publish">发布闲置</a>
        <a onclick="navigate('orders')" id="nav-orders">我的订单</a>
        <a onclick="navigate('returns')" id="nav-returns">退货管理</a>
        <a onclick="navigate('profile')" id="nav-profile">个人中心</a>
        <span id="nav-user" class="user-info" style="display:none;">
          <img src="" alt="" class="avatar" id="nav-avatar">
          <span id="nav-nickname"></span>
          <span onclick="logout()" style="cursor:pointer;">退出</span>
        </span>
        <span id="nav-login" onclick="navigate('login')">登录/注册</span>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <!-- 首页 -->
      <div id="page-home" class="page active">
        <div class="search-bar">
          <div class="container">
            <input type="text" id="search-keyword" placeholder="搜索你想要的宝贝..." onkeyup="handleSearch(event)">
            <select id="search-category" onchange="loadProducts()">
              <option value="">全部分类</option>
            </select>
          </div>
        </div>
        <div class="category-tabs" id="category-tabs"></div>
        <div class="product-grid" id="product-grid"></div>
      </div>

      <!-- 商品详情页 -->
      <div id="page-detail" class="page">
        <div class="product-detail" id="product-detail"></div>
      </div>

      <!-- 登录页 -->
      <div id="page-login" class="page">
        <div class="form-container">
          <h2 id="login-title">登录</h2>
          <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label>用户名</label>
              <input type="text" id="login-username" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
              <label>密码</label>
              <input type="password" id="login-password" required placeholder="请输入密码">
            </div>
            <div class="form-group" id="register-fields" style="display:none;">
              <label>昵称</label>
              <input type="text" id="register-nickname" placeholder="请输入昵称">
            </div>
            <div class="form-group" id="register-phone" style="display:none;">
              <label>手机号</label>
              <input type="text" id="register-phone-input" placeholder="请输入手机号">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">登录</button>
            <p class="form-link">
              <span id="switch-text">还没有账号？</span>
              <a onclick="switchAuthMode()" id="switch-link">立即注册</a>
            </p>
          </form>
        </div>
      </div>

      <!-- 发布商品页 -->
      <div id="page-publish" class="page">
        <div class="form-container" style="max-width:600px;">
          <h2>发布闲置</h2>
          <form id="publish-form" onsubmit="handlePublish(event)">
            <div class="form-group">
              <label>商品标题 *</label>
              <input type="text" id="publish-title" required placeholder="请输入商品标题">
            </div>
            <div class="form-group">
              <label>商品分类 *</label>
              <select id="publish-category" required></select>
            </div>
            <div class="form-group">
              <label>商品价格 *</label>
              <input type="number" id="publish-price" required min="0" step="0.01" placeholder="请输入出售价格">
            </div>
            <div class="form-group">
              <label>原价</label>
              <input type="number" id="publish-original-price" min="0" step="0.01" placeholder="请输入原价（选填）">
            </div>
            <div class="form-group">
              <label>成色</label>
              <select id="publish-condition">
                <option value="全新">全新</option>
                <option value="九成新" selected>九成新</option>
                <option value="八成新">八成新</option>
                <option value="七成新">七成新</option>
                <option value="有瑕疵">有瑕疵</option>
              </select>
            </div>
            <div class="form-group">
              <label>商品描述</label>
              <textarea id="publish-description" placeholder="详细描述你的宝贝，让买家更了解它..."></textarea>
            </div>
            <div class="form-group">
              <label>商品图片（每行一个URL，选填）</label>
              <textarea id="publish-images" placeholder="每行一个图片URL，留空将使用默认图片"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">立即发布</button>
          </form>
        </div>
      </div>

      <!-- 订单列表页 -->
      <div id="page-orders" class="page">
        <h2 class="page-title">我的订单</h2>
        <div class="order-tabs">
          <div class="order-tab active" onclick="switchOrderTab('all', this)">全部</div>
          <div class="order-tab" onclick="switchOrderTab('buyer', this)">我买到的</div>
          <div class="order-tab" onclick="switchOrderTab('seller', this)">我卖出的</div>
        </div>
        <div class="order-list" id="order-list"></div>
      </div>

      <!-- 订单详情页 -->
      <div id="page-order-detail" class="page">
        <div id="order-detail-content"></div>
      </div>

      <!-- 退货申请页 -->
      <div id="page-return" class="page">
        <div class="form-container">
          <h2>申请退货</h2>
          <form id="return-form" onsubmit="handleReturnSubmit(event)">
            <div class="form-group">
              <label>退货原因 *</label>
              <select id="return-reason" required>
                <option value="">请选择退货原因</option>
                <option value="质量问题">质量问题</option>
                <option value="与描述不符">与描述不符</option>
                <option value="尺码不合适">尺码不合适</option>
                <option value="不喜欢/不想要">不喜欢/不想要</option>
                <option value="其他">其他</option>
              </select>
            </div>
            <div class="form-group">
              <label>详细说明</label>
              <textarea id="return-description" placeholder="请详细描述退货原因..."></textarea>
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn-secondary" onclick="navigate('order-detail', currentOrderId)">取消</button>
              <button type="submit" class="btn btn-primary">提交申请</button>
            </div>
          </form>
        </div>
      </div>

      <!-- 个人中心页 -->
      <div id="page-profile" class="page">
        <h2 class="page-title">个人中心</h2>
        <div class="form-container" style="max-width:600px;">
          <div style="text-align:center; margin-bottom:24px;">
            <img id="profile-avatar" src="" alt="" style="width:80px; height:80px; border-radius:50%; margin-bottom:12px;">
            <h3 id="profile-nickname"></h3>
            <p style="color:#666; font-size:14px;">余额：<span id="profile-balance" style="color:#ff4444; font-weight:bold; font-size:18px;">¥0.00</span></p>
          </div>
          <form id="profile-form" onsubmit="handleProfileUpdate(event)">
            <div class="form-group">
              <label>昵称</label>
              <input type="text" id="profile-nickname-input" placeholder="请输入昵称">
            </div>
            <div class="form-group">
              <label>手机号</label>
              <input type="text" id="profile-phone" placeholder="请输入手机号">
            </div>
            <div class="form-group">
              <label>收货地址</label>
              <textarea id="profile-address" placeholder="请输入收货地址"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">保存修改</button>
          </form>
        </div>
        <div style="margin-top:24px;">
          <h3 style="margin-bottom:16px;">我的发布</h3>
          <div class="product-grid" id="my-products-grid"></div>
        </div>
      </div>

      <!-- 退货列表页 -->
      <div id="page-returns" class="page">
        <h2 class="page-title">退货管理</h2>
        <div class="order-list" id="return-list"></div>
      </div>

      <!-- 退货详情页 -->
      <div id="page-return-detail" class="page">
        <div id="return-detail-content"></div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <script src="/js/app.js"></script>
</body>
</html>
